      <g id="nodes-layer"><rect x="0" y="50" width="200" height="140" class="node node-container"></rect><foreignObject x="0" y="50" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">FE White Label</div><div class="node-type">[Container: Front End Web Application]</div><div class="node-desc">Provides search and book capabilities to White Label users</div></div></foreignObject><rect x="340" y="50" width="200" height="140" class="node node-container"></rect><foreignObject x="340" y="50" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Public API Gateway</div><div class="node-type">[Container: Software System]</div><div class="node-desc">Provides Public API to 3rd party API partners</div></div></foreignObject><rect x="900" y="550" width="200" height="140" class="node node-container"></rect><foreignObject x="900" y="550" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Cart Service</div><div class="node-type">[Container: Software System]</div><div class="node-desc">Provides cart management capabilities. Create cart, add item to cart, remove item to cart and validate cart.</div></div></foreignObject><rect x="900" y="800" width="200" height="140" class="node node-container"></rect><foreignObject x="900" y="800" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Integration Service</div><div class="node-type">[Container: Software System]</div><div class="node-desc">Performs searches and bookings with 3rd party API providers.</div></div></foreignObject><rect x="900" y="1050" width="200" height="140" class="node node-container"></rect><foreignObject x="900" y="1050" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Promotion Service</div><div class="node-type">[Container: Software System]</div><div class="node-desc">Provides promotion management capabilities and applies promotion offers on search results</div></div></foreignObject><rect x="680" y="50" width="200" height="140" class="node node-external"></rect><foreignObject x="680" y="50" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">AWS EventBridge</div><div class="node-type">[External System: Software System]</div><div class="node-desc">AWS EventBridge serverless event bus that enables applications to communicate with each other using events.</div></div></foreignObject><rect x="900" y="300" width="200" height="140" class="node node-container"></rect><foreignObject x="900" y="300" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Partner Service</div><div class="node-type">[Container: Software System]</div><div class="node-desc">Manages Partner configuration and management</div></div></foreignObject><rect x="170" y="350" width="200" height="140" class="node node-container"></rect><foreignObject x="170" y="350" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Search Service API Gateway</div><div class="node-type">[Container: AWS API Gateway]</div><div class="node-desc">Exposes Search Service APIs through API Gateway for external/internal consumers</div></div></foreignObject><rect x="340" y="600" width="200" height="140" class="node node-container"></rect><foreignObject x="340" y="600" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Search Service Lambda</div><div class="node-type">[Container: .NET 10]</div><div class="node-desc">Handles search requests</div></div></foreignObject><path d="M 510 866 L 510 974 A 100 16 0 0 0 710 974 L 710 866" class="node node-database"></path><ellipse cx="610" cy="866" rx="100" ry="16" class="db-cap"></ellipse><foreignObject x="510" y="890" width="200" height="84"><div class="node-content-wrapper"><div class="node-title">Database</div><div class="node-type">[Database: AWS DynamoDB]</div><div class="node-desc">Stores search and availability results</div></div></foreignObject><path d="M 170 866 L 170 974 A 100 16 0 0 0 370 974 L 370 866" class="node node-database"></path><ellipse cx="270" cy="866" rx="100" ry="16" class="db-cap"></ellipse><foreignObject x="170" y="890" width="200" height="84"><div class="node-content-wrapper"><div class="node-title">Cache Database</div><div class="node-type">[Database: Redis / Valkey]</div><div class="node-desc">Caches search requests and responses to reduce latency and downstream load</div></div></foreignObject><rect x="510" y="350" width="200" height="140" class="node node-container"></rect><foreignObject x="510" y="350" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Partner Sync Lambda</div><div class="node-type">[Container: NodeJS Lambda Function]</div><div class="node-desc">Handles partner data sync in search service</div></div></foreignObject></g>
