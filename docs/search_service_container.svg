<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 1190"><style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a; /* Slate 900 */
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    #diagram-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    svg {
      width: 100%;
      height: 100%;
      user-select: none;
    }
    /* SVG Styling */
    .boundary {
      fill: #334155; /* Slate 700 — lifted from Slate 800 for better contrast */
      stroke: #64748b;
      stroke-width: 2px;
      stroke-dasharray: 6, 6;
      rx: 8;
    }
    .boundary-label {
      fill: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .node {
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
      stroke-width: 2px;
      rx: 6;
    }
    .node-person {
      fill: #0284c7; /* Sky 600 */
      stroke: #0ea5e9;
    }
    .person-head {
      fill: #0ea5e9; /* Sky 500 — lighter than body */
      stroke: none;
    }
    .node-container {
      fill: #1e3a8a; /* Blue 900 */
      stroke: #3b82f6;
    }
    .node-external {
      fill: #334155; /* Slate 700 */
      stroke: #64748b;
    }
    .node-database {
      fill: #1e3a8a; /* Blue 900 body */
      stroke: #3b82f6; /* Blue 500 */
    }
    .db-cap {
      fill: #3b82f6; /* Blue 500 — clearly lighter than body so lid reads as solid */
      stroke: none;
    }
    .db-rim {
      fill: none;
      stroke: #dbeafe; /* Blue 100 — bright */
      stroke-width: 2.5px;
      stroke-linecap: round;
    }
    .node-message-bus {
      fill: #1e3a8a; /* Blue 900 body */
      stroke: #3b82f6; /* Blue 500 */
    }
    .message-bus-cap {
      fill: #3b82f6; /* Blue 500 — lighter than body */
      stroke: #1e3a8a; /* Blue 900 cap border */
      stroke-width: 2px;
    }
    /* Edge and Connector lines */
    .edge-line {
      fill: none;
      stroke: #64748b;
      stroke-width: 1.8px;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 6, 6;
      transition: stroke 0.2s;
    }
    .edge-label-bg {
      fill: #0f172a; /* Same as background to mask line */
      rx: 4;
    }
    .edge-label-text {
      fill: #cbd5e1;
      font-size: 11px;
      font-weight: 500;
      text-anchor: middle;
    }
    .diagram-title-text {
      fill: #f8fafc;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.025em;
    }
    /* Node HTML content via foreignObject */
    .node-content-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4px 8px;
      box-sizing: border-box;
      color: #f8fafc;
      text-align: center;
    }
    .node-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .node-type {
      font-size: 10px;
      font-weight: 600;
      opacity: 0.7;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }
    .node-desc {
      font-size: 11px;
      opacity: 0.85;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
      <defs>
        <!-- Arrowhead markers -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b"></path>
        </marker>
      </defs>
      <g id="title-layer"><text x="80" y="35" class="diagram-title-text">C4 Container Diagram : Search Service</text></g>
      <g id="boundaries-layer"><rect x="170" y="300" width="700" height="804" class="boundary"></rect><text x="250" y="1084" class="boundary-label">Search Service</text></g>
      <g id="edges-layer"><path d="M 180 190 L 350 380" class="edge-line" marker-end="url(#arrow)"></path><path d="M 520 190 L 350 380" class="edge-line" marker-end="url(#arrow)"></path><path d="M 350 520 L 520 630" class="edge-line" marker-end="url(#arrow)"></path><path d="M 520 770 L 690 880" class="edge-line" marker-end="url(#arrow)"></path><path d="M 520 770 L 350 880" class="edge-line" marker-end="url(#arrow)"></path><path d="M 620 700 L 1010 620" class="edge-line" marker-end="url(#arrow)"></path><path d="M 620 700 L 1010 870" class="edge-line" marker-end="url(#arrow)"></path><path d="M 620 700 L 930 700 Q 940 700 940 710 L 940 1110 Q 940 1120 950 1120 L 1010 1120" class="edge-line" marker-end="url(#arrow)"></path><path d="M 690 520 L 690 880" class="edge-line" marker-end="url(#arrow)"></path><path d="M 790 450 L 1010 370" class="edge-line" marker-end="url(#arrow)"></path><path d="M 860 190 L 690 380" class="edge-line" marker-end="url(#arrow)"></path></g>
      <g id="nodes-layer"><rect x="80" y="50" width="200" height="140" class="node node-container"></rect><foreignObject x="80" y="50" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">FE White Label</div><div class="node-type">[Container]</div><div class="node-desc">Front End Web Application</div></div></foreignObject><rect x="420" y="50" width="200" height="140" class="node node-container"></rect><foreignObject x="420" y="50" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Public API Gateway</div><div class="node-type">[Container]</div><div class="node-desc">Software System</div></div></foreignObject><rect x="1010" y="550" width="200" height="140" class="node node-container"></rect><foreignObject x="1010" y="550" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Cart Service</div><div class="node-type">[Container]</div><div class="node-desc">Software System</div></div></foreignObject><rect x="1010" y="800" width="200" height="140" class="node node-container"></rect><foreignObject x="1010" y="800" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Integration Service</div><div class="node-type">[Container]</div><div class="node-desc">Software System</div></div></foreignObject><rect x="1010" y="1050" width="200" height="140" class="node node-container"></rect><foreignObject x="1010" y="1050" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Promotion Service</div><div class="node-type">[Container]</div><div class="node-desc">Software System</div></div></foreignObject><rect x="760" y="50" width="200" height="140" class="node node-external"></rect><foreignObject x="760" y="50" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">AWS EventBridge</div><div class="node-type">[External System]</div><div class="node-desc">Software System</div></div></foreignObject><rect x="1010" y="300" width="200" height="140" class="node node-container"></rect><foreignObject x="1010" y="300" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Partner Service</div><div class="node-type">[Container]</div><div class="node-desc">Software System</div></div></foreignObject><rect x="250" y="380" width="200" height="140" class="node node-container"></rect><foreignObject x="250" y="380" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Search Service API Gateway</div><div class="node-type">[Container: AWS API Gateway]</div><div class="node-desc">Exposes Search Service APIs through API Gateway for external/internal consumers</div></div></foreignObject><rect x="420" y="630" width="200" height="140" class="node node-container"></rect><foreignObject x="420" y="630" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Search Service Lambda</div><div class="node-type">[Container: .NET 10]</div><div class="node-desc">Handles search requests</div></div></foreignObject><path d="M 590 896 L 590 1004 A 100 16 0 0 0 790 1004 L 790 896" class="node node-database"></path><ellipse cx="690" cy="896" rx="100" ry="16" class="db-cap"></ellipse><foreignObject x="590" y="920" width="200" height="84"><div class="node-content-wrapper"><div class="node-title">Database</div><div class="node-type">[Database: AWS DynamoDB]</div><div class="node-desc">Stores search and availability results</div></div></foreignObject><path d="M 250 896 L 250 1004 A 100 16 0 0 0 450 1004 L 450 896" class="node node-database"></path><ellipse cx="350" cy="896" rx="100" ry="16" class="db-cap"></ellipse><foreignObject x="250" y="920" width="200" height="84"><div class="node-content-wrapper"><div class="node-title">Cache Database</div><div class="node-type">[Database: Redis / Valkey]</div><div class="node-desc">Caches search requests and responses to reduce latency and downstream load</div></div></foreignObject><rect x="590" y="380" width="200" height="140" class="node node-container"></rect><foreignObject x="590" y="380" width="200" height="140"><div class="node-content-wrapper"><div class="node-title">Partner Sync Lambda</div><div class="node-type">[Container: NodeJS Lambda Function]</div><div class="node-desc">Handles partner data sync in search service</div></div></foreignObject></g>
