<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nudge Diagram Renderer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="vendor/elk.bundled.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a; /* Slate 900 */
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    #diagram-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    svg {
      width: 100%;
      height: 100%;
      user-select: none;
    }
    /* SVG Styling */
    .boundary {
      fill: transparent;
      stroke: #cbd5e1; /* Light grey (Slate 300) */
      stroke-opacity: 0.5;
      stroke-width: 3px;
      stroke-dasharray: 8, 8; /* Dashed */
      rx: 8;
    }
    .boundary-label {
      fill: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .node {
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
      stroke-width: 2px;
      rx: 6;
    }
    .node-person {
      fill: #0284c7; /* Sky 600 */
      stroke: #0ea5e9;
    }
    .person-head {
      fill: #0ea5e9; /* Sky 500 — lighter than body */
      stroke: none;
    }
    .node-container {
      fill: #1e3a8a; /* Blue 900 — system in scope (focal) */
      stroke: #3b82f6;
    }
    .node-supporting {
      fill: #2a3c66; /* Muted internal blue — a dimmer, desaturated relative of the focal Blue 900. Reads as internal (blue family) but secondary, and stays distinct from the grey external Slate 700. */
      stroke: #4763a5; /* Mid blue — dimmer than the focal's bright Blue 500 stroke */
    }
    .node-external {
      fill: #334155; /* Slate 700 */
      stroke: #64748b;
    }
    .node-database {
      fill: #1e3a8a; /* Blue 900 body */
      stroke: #3b82f6; /* Blue 500 */
    }
    .db-cap {
      fill: #3b82f6; /* Blue 500 — clearly lighter than body so lid reads as solid */
      stroke: none;
    }
    .db-rim {
      fill: none;
      stroke: #dbeafe; /* Blue 100 — bright */
      stroke-width: 2.5px;
      stroke-linecap: round;
    }
    .node-message-bus {
      fill: #1e3a8a; /* Blue 900 body */
      stroke: #3b82f6; /* Blue 500 */
    }
    .message-bus-cap {
      fill: #3b82f6; /* Blue 500 — lighter than body */
      stroke: #1e3a8a; /* Blue 900 cap border */
      stroke-width: 2px;
    }
    /* Edge and Connector lines */
    .edge-line {
      fill: none;
      stroke: #cbd5e1; /* Slate 300 — distinct from Slate 400 boundary stroke */
      stroke-width: 1.8px;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 6, 6;
      transition: stroke 0.2s;
    }
    .edge-label-bg {
      fill: #0f172a; /* Same as background to mask line */
      rx: 4;
    }
    .edge-label-text {
      fill: #cbd5e1;
      font-size: 11px;
      font-weight: 500;
      text-anchor: middle;
    }
    .diagram-title-text {
      fill: #f8fafc;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.025em;
    }
    /* Legend — horizontal key of element kinds present in the diagram */
    .legend-panel {
      fill: #111c34; /* Slightly lifted from the Slate 900 background */
      stroke: #334155; /* Slate 700 */
      stroke-width: 1px;
      rx: 8;
    }
    .legend-label {
      fill: #e2e8f0; /* Slate 200 */
      font-size: 13px;
      font-weight: 500;
    }
    /* Icons are miniatures of the real shapes: lighten the stroke and shadow
       that are tuned for full-size nodes so they don't read as heavy. */
    .legend-icon .node {
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
      stroke-width: 1.25px;
    }
    .legend-icon .message-bus-cap {
      stroke-width: 1px;
    }
    /* Annotation notes — folded-corner (dog-ear) boxes */
    .note {
      fill: #fef9c3; /* Amber 100 — pale yellow sticky-note */
      stroke: #ca8a04; /* Amber 600 */
      stroke-width: 1.5px;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.3));
    }
    .note-fold {
      fill: #fde68a; /* Amber 200 — slightly darker fold */
      stroke: #ca8a04;
      stroke-width: 1.5px;
      stroke-linejoin: round;
    }
    .note-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-sizing: border-box;
      color: #422006; /* Amber 950 — dark ink on pale note */
      font-size: 12px;
      line-height: 1.25;
      text-align: left;
      overflow: hidden;
    }
    /* Node HTML content via foreignObject */
    .node-content-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4px 8px;
      box-sizing: border-box;
      color: #f8fafc;
      text-align: center;
    }
    .node-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .node-type {
      font-size: 10px;
      font-weight: 600;
      opacity: 0.7;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }
    .node-tech {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      opacity: 0.7;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .node-desc {
      font-size: 11px;
      opacity: 0.85;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="diagram-container">
    <svg id="svg-root">
      <defs>
        <!-- Arrowhead markers -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
          <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#cbd5e1" />
        </marker>
      </defs>
      <g id="title-layer"></g>
      <g id="boundaries-layer"></g>
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
      <g id="notes-layer"></g>
      <g id="edge-labels-layer"></g>
      <g id="legend-layer"></g>
    </svg>
  </div>
  <script src="renderer/namespace.js"></script>
  <script src="renderer/shared/text.js"></script>
  <script src="renderer/shared/geometry.js"></script>
  <script src="renderer/elk/layout_policies.js"></script>
  <script src="renderer/elk/elk_graph_transform.js"></script>
  <script src="renderer/container/container_plan.js"></script>
  <script src="renderer/container/plan_summary.js"></script>
  <script src="renderer/container/utility_row_rules.js"></script>
  <script src="renderer/container/container_layout.js"></script>
  <script src="renderer/routing/visibility_graph.js"></script>
  <script src="renderer/routing/grid_connection_line_router.js"></script>
  <script src="renderer/routing/route_geometry.js"></script>
  <script src="renderer/routing/route_specifications.js"></script>
  <script src="renderer/routing/route_candidate_rules.js"></script>
  <script src="renderer/routing/connection_line_router.js"></script>
  <script src="renderer/svg/architecture_element_shapes.js"></script>
  <script src="renderer/svg/legend.js"></script>
  <script src="renderer/svg/connection_line_rendering.js"></script>
  <script src="renderer/labels/connection_label_placement.js"></script>
  <script src="renderer/labels/connection_label_rendering.js"></script>
  <script src="renderer/svg/svg_renderer.js"></script>
  <script src="render_engine.js"></script>
</body>
</html>
