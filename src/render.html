<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nudge Diagram Renderer</title>
  <script src="vendor/elk.bundled.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a; /* Slate 900 */
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    #diagram-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    svg {
      width: 100%;
      height: 100%;
      user-select: none;
    }
    /* SVG Styling */
    .boundary {
      fill: #526174; /* Slightly brighter slate for clearer boundary contrast */
      stroke: #94a3b8;
      stroke-width: 3px;
      rx: 8;
    }
    .boundary-label {
      fill: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .node {
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
      stroke-width: 2px;
      rx: 6;
    }
    .node-person {
      fill: #0284c7; /* Sky 600 */
      stroke: #0ea5e9;
    }
    .person-head {
      fill: #0ea5e9; /* Sky 500 — lighter than body */
      stroke: none;
    }
    .node-container {
      fill: #1e3a8a; /* Blue 900 */
      stroke: #3b82f6;
    }
    .node-external {
      fill: #334155; /* Slate 700 */
      stroke: #64748b;
    }
    .node-database {
      fill: #1e3a8a; /* Blue 900 body */
      stroke: #3b82f6; /* Blue 500 */
    }
    .db-cap {
      fill: #3b82f6; /* Blue 500 — clearly lighter than body so lid reads as solid */
      stroke: none;
    }
    .db-rim {
      fill: none;
      stroke: #dbeafe; /* Blue 100 — bright */
      stroke-width: 2.5px;
      stroke-linecap: round;
    }
    .node-message-bus {
      fill: #1e3a8a; /* Blue 900 body */
      stroke: #3b82f6; /* Blue 500 */
    }
    .message-bus-cap {
      fill: #3b82f6; /* Blue 500 — lighter than body */
      stroke: #1e3a8a; /* Blue 900 cap border */
      stroke-width: 2px;
    }
    /* Edge and Connector lines */
    .edge-line {
      fill: none;
      stroke: #cbd5e1; /* Slate 300 — distinct from Slate 400 boundary stroke */
      stroke-width: 1.8px;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 6, 6;
      transition: stroke 0.2s;
    }
    .edge-label-bg {
      fill: #0f172a; /* Same as background to mask line */
      rx: 4;
    }
    .edge-label-text {
      fill: #cbd5e1;
      font-size: 11px;
      font-weight: 500;
      text-anchor: middle;
    }
    .diagram-title-text {
      fill: #f8fafc;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.025em;
    }
    /* Node HTML content via foreignObject */
    .node-content-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4px 8px;
      box-sizing: border-box;
      color: #f8fafc;
      text-align: center;
    }
    .node-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .node-type {
      font-size: 10px;
      font-weight: 600;
      opacity: 0.7;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }
    .node-desc {
      font-size: 11px;
      opacity: 0.85;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="diagram-container">
    <svg id="svg-root">
      <defs>
        <!-- Arrowhead markers -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
        </marker>
      </defs>
      <g id="title-layer"></g>
      <g id="boundaries-layer"></g>
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
      <g id="edge-labels-layer"></g>
    </svg>
  </div>
  <script src="render_engine.js"></script>
</body>
</html>
